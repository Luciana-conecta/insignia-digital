<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insignia</title>

    <link rel="icon" type="image/png" sizes="180x180" href="components/assets/logo/Isologo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <script>
      // Polyfill para evitar errores de 'process is not defined' en librerías externas
      window.process = { env: { NODE_ENV: 'production' } };

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#0b4b6f',
              accent: '#F4B400',
              secondary: '#111518',
              surface: '#F5F7FA',
            },
            fontFamily: {
              sans: ['Manrope', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            animation: {
              marquee: 'marquee var(--duration, 30s) linear infinite',
              'marquee-reverse': 'marquee-reverse var(--duration, 30s) linear infinite',
            },
            keyframes: {
              marquee: {
                to: { transform: 'translateX(-50%)' }
              },
              'marquee-reverse': {
                from: { transform: 'translateX(-50%)' },
                to: { transform: 'translateX(0)' }
              }
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --sky-400: #38bdf8;
        --sky-500: #0ea5e9;
      }
      body { font-family: 'Manrope', sans-serif; scroll-behavior: smooth; }
      h1, h2, h3, h4, h5, h6 { font-family: 'Space Grotesk', sans-serif; }
      .bg-dot-pattern {
        background-image: radial-gradient(#ffffff15 1px, transparent 1px);
        background-size: 24px 24px;
      }
    </style>
    <script type="importmap">
{

    "framer-motion": "https://esm.sh/framer-motion@11.11.11?deps=react@19.0.0",
    "react-use-measure": "https://esm.sh/react-use-measure@3.1.1?deps=react@19.0.0",
    "clsx": "https://esm.sh/clsx@2.1.1",
    "tailwind-merge": "https://esm.sh/tailwind-merge@2.5.4",
    "simplex-noise": "https://esm.sh/simplex-noise@4.0.3",
    "react-icons/fa": "https://esm.sh/react-icons@5.4.0/fa?deps=react@19.0.0",
    "react-icons/": "https://esm.sh/react-icons@^5.5.0/",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?deps=react@19.0.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
